version: 1
frontend:
  phases:
    preBuild:
      commands:
        - rm -f package-lock.json
        - npm cache clean --force
        - rm -rf node_modules
        - rm -rf .next
        - rm -rf out
        - npm install --force
        - echo "Dependencies installed"
    build:
      commands:
        - echo "Building Next.js app"
        - node -v
        - npm run build
        - npm run generate-site-images
    postBuild:
      commands:
        - echo "Calling Config Vault postbuild"
        - npm run config:vault -- postbuild || (echo "Config postbuild decrypt failed" && exit 1) 
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
    customHeaders:
      # Static _next assets and routed static files: 1 year cache edge + browser

      - pattern: '/_next/static/*'
        headers:
          - key: 'Cache-Control'
            value: 'public, max-age=31536000, s-maxage=31536000, immutable'

      - pattern: '/_next/image/*'
        headers:
          - key: 'Cache-Control'
            value: 'public, max-age=31536000, s-maxage=31536000, immutable'

      - pattern: '/public/*'
        headers:
          - key: 'Cache-Control'
            value: 'public, max-age=31536000, s-maxage=31536000, immutable'

      # Public asset patterns referenced from CSS/fonts and not proxied through Next route handlers
      - pattern: '/images/**/*'
        headers:
          - key: 'Cache-Control'
            value: 'public, max-age=31536000, s-maxage=31536000, immutable'

      # fonts are nested and should get same 1y caching
      - pattern: '/fonts/**/*'
        headers:
          - key: 'Cache-Control'
            value: 'public, max-age=31536000, s-maxage=31536000, immutable'

      # generic static files for anything else
      - pattern: '/**/*.{css,eot,gif,htm,html,ico,jpg,jpeg,js,json,mp4,ogg,otf,png,svg,ttf,webm,webp,woff,woff2,xml,xsl,zip}'
        headers:
          - key: 'Cache-Control'
            value: 'public, max-age=31536000, s-maxage=31536000, immutable'
      - pattern: '/**/*'
        headers:
          - key: 'Cache-Control'
            value: 'public, max-age=31536000, s-maxage=31536000, immutable'

      # HTML pages: 1 week edge + browser; stale-while-revalidate for quick updates
      - pattern: '/'
        headers:
          - key: 'Cache-Control'
            value: 'public, max-age=31536000, s-maxage=31536000, immutable'

      # API and dynamic content should use short edge TTL, allow stale while revalidate
      - pattern: '/api/*'
        headers:
          - key: 'Cache-Control'
            value: 'public, max-age=0, s-maxage=60, stale-while-revalidate=30'
  cache:
    paths:
      - .next/cache/**/*
      - .next/static/**/*
      - node_modules/**/*
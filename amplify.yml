version: 1
frontend:
  phases:
    preBuild:
      commands:
        - rm -f package-lock.json
        - npm cache clean --force
        - rm -rf node_modules
        - rm -rf .next
        - rm -rf out
        - npm install --force
        - echo "Dependencies installed"
    build:
      commands:
        - echo "Building Next.js app"
        - node -v
        - npm run build
        - npm run generate-site-images
    postBuild:
      commands:
        - echo "Calling Config Vault postbuild"
        - npm run config:vault -- postbuild || (echo "Config postbuild decrypt failed" && exit 1) 
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
    customHeaders:
      # Static assets: images, fonts, scripts, styles, videos, docs (alpha order)
      # Cache at edge and browser for 1 year, immutable
        - pattern: '**/*.{css,gif,ico,jpg,js,json,md,mp4,png,scss,svg,txt,webm,webp,woff2,xml}'
          headers:
            - key: 'Cache-Control'
              value: 'public, max-age=31536000, s-maxage=31536000, immutable'
      # HTML files: cache at edge for 1 day, browser for 1 week
        - pattern: '**/*.html'
          headers:
            - key: 'Cache-Control'
              value: 'public, max-age=86400, s-maxage=604800, must-revalidate'
        # Extensionless files (homepage, etc.)
        - pattern: '/'
          headers:
            - key: 'Cache-Control'
              value: 'public, max-age=86400, s-maxage=604800, must-revalidate'
        - pattern: '*'
          headers:
            - key: 'Cache-Control'
              value: 'public, max-age=86400, s-maxage=604800, must-revalidate'
  cache:
    paths:
      - .next/cache/**/*
      - .next/static/**/*
      - node_modules/**/*